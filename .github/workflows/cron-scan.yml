name: RSI Alert — 5분 스캔 (한국장)

on:
  schedule:
    # 한국장 (KST 09:00~15:30 = UTC 00:00~06:30) — 5분마다
    - cron: '*/5 0-6 * * 1-5'
  workflow_dispatch:   # 수동 실행 허용

jobs:
  scan:
    name: Trigger Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call /api/cron/scan
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/scan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP Status: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "::warning::스캔 응답 코드 $RESPONSE"
          fi
